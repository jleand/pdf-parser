name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Send POST request to /parse with...
        2. Upload a PDF that...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Any relevant log output or error messages
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running the service?
      options:
        - Docker
        - Local (Python)
        - Kubernetes
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of PDF Parser are you using?
      placeholder: "1.0.0"

  - type: textarea
    id: pdf-info
    attributes:
      label: PDF Characteristics
      description: Describe the PDF you're trying to parse (if relevant)
      placeholder: |
        - Number of pages:
        - Text-based or scanned:
        - File size:
        - Any special characteristics:

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
